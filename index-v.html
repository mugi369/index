<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>むぎ観察日記</title>

<style>
body{
    background:#111;
    color:#eee;
    font-family:sans-serif;
    text-align:center;
    padding:40px;
}

.card{
    max-width:500px;
    margin:auto;
    padding:20px;
    border:1px solid #444;
    border-radius:15px;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

<h1>🐈‍⬛ むぎ観察日記</h1>

<p id="message"></p>

<p>
訪問回数：
<span id="visitCount">0</span>
</p>

<button id="mugiButton">
むぎを呼ぶ
</button>

</div>

<script>

let visitCount =
Number(
localStorage.getItem("visitCount")
|| 0
);

if(!localStorage.getItem("siteBirth")){

localStorage.setItem(
"siteBirth",
Date.now()
);

}

const birth =
Number(
localStorage.getItem("siteBirth")
);

const days =
Math.floor(
(Date.now()-birth)
/
86400000
)+1;

let status =
"また来たのか。";

if(visitCount >= 5)
status =
"最近よく見るな。";

if(visitCount >= 10)
status =
"顔を覚えた。";

if(visitCount >= 30)
status =
"常連だな。";

if(visitCount >= 100)
status =
"もう管理人だろ。";

const hour =
new Date().getHours();

if(hour >= 0 && hour < 5){

status =
"お前も起きてるのか。";

}

if(
Math.random() < 0.02
){

status =
"ちくわ天。";

}

if(Math.random() < 0.01){
    status = "鼻の下クソワロ。";
}

if(hour >= 2 && hour < 5){
    status = "寝ろ。";
}

visitCount++;

localStorage.setItem(
"visitCount",
visitCount
);

document.getElementById(
"visitCount"
).textContent =
visitCount;

const comments = [

"また来たのか。",

"人間だ。",

"観察対象を確認。",

"今日は静かだな。",

"ちくわ天。",

"鼻の下クソワロ。"

];

document
.getElementById("mugiButton")
.addEventListener(
"click",
function(){

const comment =
comments[
Math.floor(
Math.random()
*
comments.length
)
];

document.getElementById(
"message"
).textContent =
comment;

}
);

document
.getElementById("message")
.textContent =
status;

document
.getElementById("siteAge")
.textContent =
"開設　";
+
days
+
" 日目";

if(days === 1){
    ageComment = "まだ新築だな。";
}

if(days >= 30){
    ageComment = "ずいぶん住み着いたな。";
}
</script>

</body>
</html>
